# ai-quickstart Wave 2A: tag-based alternatives table.
#
# Schema:
#   schema_version: int (required, currently 1)
#   alternatives:
#     <tag>:                              # e.g. research-assistant, code-review
#       saas:                             # hosted SaaS alternatives
#         - name: <str>
#           url: <str>
#           why: <str>
#       oss: ...
#       claude_skill: ...                 # native Claude Code / Anthropic skill
#       mcp_server: ...                   # MCP server, plug-and-play
#       agent_platform: ...               # higher-level agent runners
#
# Curation rules:
#   - Real, currently-existing tools only. Don't fabricate URLs.
#   - Each tag should cover at least one entry per kind where reasonable.
#     Missing kinds are fine (some kinds don't exist for some tags).
#   - Keep `why` short — single line, <80 chars.
#   - Tags align with `personas.yaml` claude_skills[].name where practical so
#     pair_with_suggestion can match the suggestion's `category`/`name` tag.

